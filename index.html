<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha IA no Render</title>
  <style>
    body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
    input { padding: 12px; width: 300px; border-radius: 8px; border: none; font-size: 16px; margin-bottom: 10px; }
    button { padding: 12px 24px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
    button:hover { background: #2563eb; }
    #resposta { margin-top: 30px; color: #94a3b8; font-size: 18px; line-height: 1.6; max-width: 600px; margin-left: auto; margin-right: auto; text-align: left; background: #1e293b; padding: 20px; border-radius: 8px; }
  </style>
</head>
<body>

  <h1>Minha IA no Render </h1>
  <p>HTML, JavaScript e FastAPI rodando no mesmo servidor.</p>
  <br>
  
  <input type="text" id="pergunta" placeholder="Digite sua dúvida aqui...">
  <br>
  <button onclick="chamarIA()">Enviar para o Servidor</button>
  
  <div id="resposta" style="display: none;"></div>

  <script>
    async function chamarIA() {
      const campoTexto = document.getElementById('pergunta').value;
      const blocoResposta = document.getElementById('resposta');
      
      if (!campoTexto) return alert("Por favor, digite algo antes de enviar!");
      
      blocoResposta.style.display = "block";
      blocoResposta.innerText = " Pensando...";

      try {
        // Como o HTML e o Python rodam na mesma máquina/URL, usamos a rota relativa direto!
        const response = await fetch("/perguntar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ texto: campoTexto })
        });

        if (!response.ok) throw new Error("Erro no servidor");

        const dados = await response.json();
        blocoResposta.innerText = dados.resposta;
      } catch (erro) {
        blocoResposta.innerText = " Erro ao falar com o servidor. Verifique se a chave da OpenAI está configurada no Render.";
        console.error(erro);
      }
    }
  </script>
</body>
</html>
